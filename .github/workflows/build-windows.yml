name: Build Windows

# 精简版：只构建 Windows MSI / NSIS 安装包，不签名、不公证、不需要任何 Secret。
# 触发方式：
#   1) 在 Actions 页面手动点 "Run workflow"（workflow_dispatch）
#   2) 推送 win-v* 开头的 tag（如 win-v3.16.3）自动触发并发布到 Release
on:
  workflow_dispatch:
  push:
    tags:
      - 'win-v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App (Windows, no updater signing)
        shell: bash
        run: pnpm tauri build --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: Collect installers
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          find src-tauri/target/release/bundle -name "*.msi" -exec cp {} release-assets/ \; || true
          find src-tauri/target/release/bundle -name "*-setup.exe" -exec cp {} release-assets/ \; || true
          ls -la release-assets

      - name: Upload installers as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: CC-Switch-Windows-Installers
          path: release-assets/*
          if-no-files-found: error

      - name: Publish to GitHub Release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: CC Switch ${{ github.ref_name }} (Windows)
          prerelease: true
          body: |
            CC Switch Windows 安装包（个人构建，未做代码签名，安装时若有 SmartScreen 提示选「仍要运行」即可）。

            - `*.msi` —— MSI 安装版
            - `*-setup.exe` —— NSIS 安装版
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
